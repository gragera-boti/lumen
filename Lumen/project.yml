name: Lumen
options:
  bundleIdPrefix: com.gragera
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    DEVELOPMENT_TEAM: YUYU7763AG
    CODE_SIGN_STYLE: Automatic

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: "5.0.0"
  StableDiffusion:
    url: https://github.com/apple/ml-stable-diffusion.git
    from: "1.1.0"

targets:

  Lumen:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Extensions
      - path: Features
      - path: Models
      - path: Navigation
      - path: Services
      - path: Theme
      - path: Resources
        buildPhase: resources
        excludes:
          - "CoreMLStableDiffusion"
      - path: Resources/CoreMLStableDiffusion
        buildPhase: resources
        resourceTags:
          - tags: [ai-model]
            configs: [Release]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gragera.lumen
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: Lumen.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Lumen
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        ON_DEMAND_RESOURCES_INITIAL_INSTALL_TAGS: ""
        ON_DEMAND_RESOURCES_PREFETCH_ORDER: ""
      debug:
        ON_DEMAND_RESOURCES_INITIAL_INSTALL_TAGS: "ai-model"
        ON_DEMAND_RESOURCES_PREFETCH_ORDER: "ai-model"
    dependencies:
      - target: LumenWidgets
        embed: true
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI
      - package: StableDiffusion
        product: StableDiffusion

  LumenWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: LumenWidgets
        excludes:
          - "*.entitlements"
          - "Info.plist"
      - path: Models/Enums/Tone.swift
      - path: Models/Enums/ThemeType.swift
      - path: Extensions/Color+Hex.swift
      - path: Theme/Theme.swift
      - path: Theme/Components/GradientBackground.swift
      - path: Theme/Components/ReadabilityOverlay.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gragera.lumen.widgets
        INFOPLIST_FILE: LumenWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: LumenWidgets/LumenWidgets.entitlements
        SKIP_INSTALL: "YES"

  LumenWatch:
    type: application
    platform: watchOS
    sources:
      - path: LumenWatch
        excludes:
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gragera.lumen.watchkitapp
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_ENTITLEMENTS: LumenWatch/LumenWatch.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Lumen
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.gragera.lumen
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SKIP_INSTALL: "YES"

  LumenTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Lumen
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gragera.lumen.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Lumen.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Lumen"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Lumen:
    build:
      targets:
        Lumen: all
        LumenWidgets: all
        LumenTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LumenTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  LumenWatch:
    build:
      targets:
        LumenWatch: all
    run:
      config: Debug
