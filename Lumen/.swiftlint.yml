# SwiftLint — semantic rules only (formatting handled by swift-format)

included:
  - App
  - Extensions
  - Features
  - Models
  - Navigation
  - Services
  - Theme
  - Tests

excluded:
  - build
  - .build
  - DerivedData
  - LumenWidgets
  - LumenWatch
  - ContentPack
  - Resources

# Disable all formatting/style rules — swift-format owns those
disabled_rules:
  - closing_brace
  - closure_spacing
  - colon
  - comma
  - control_statement
  - leading_whitespace
  - line_length
  - mark
  - opening_brace
  - operator_usage_whitespace
  - return_arrow_whitespace
  - statement_position
  - switch_case_alignment
  - trailing_comma
  - trailing_newline
  - trailing_semicolon
  - trailing_whitespace
  - vertical_whitespace

opt_in_rules:
  # Correctness
  - force_unwrapping
  - force_try
  - force_cast
  - implicitly_unwrapped_optional
  - empty_count
  - empty_string
  - fatal_error_message
  - first_where
  - last_where
  - contains_over_first_not_nil
  - flatmap_over_map_reduce
  - identical_operands
  - override_in_extension
  - redundant_nil_coalescing
  - redundant_type_annotation
  - toggle_bool
  - unavailable_function
  - unowned_variable_capture
  - yoda_condition
  - self_in_property_initialization
  - legacy_multiple
  - static_over_final_class
  - prefer_zero_over_explicit_init

  # Architecture
  - file_length
  - function_body_length
  - type_body_length
  - cyclomatic_complexity
  - nesting
  - large_tuple

  # Concurrency
  - discouraged_none_name

# Rule configuration
file_length:
  warning: 300
  error: 500

function_body_length:
  warning: 40
  error: 80

type_body_length:
  warning: 300
  error: 500

cyclomatic_complexity:
  warning: 10
  error: 20

nesting:
  type_level: 2
  function_level: 3

large_tuple:
  warning: 3
  error: 4

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - i
    - j
    - x
    - y
    - r
    - g
    - b
    - a
    - h
    - s
    - t
    - n
    - id

reporter: xcode
