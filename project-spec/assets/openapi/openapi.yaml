openapi: 3.1.0
info:
  title: Lumen Backend API
  version: "1.0.0"
  description: >
    Optional backend for Lumen (content packs, remote config, opt-in user sync, reporting).
servers:
  - url: https://api.lumenapp.example
paths:
  /v1/content/manifest:
    get:
      summary: Get available content packs for a locale
      parameters:
        - in: query
          name: locale
          required: true
          schema:
            type: string
          example: en-GB
      responses:
        "200":
          description: Manifest
          content:
            application/json:
              schema:
                type: object
                required: [locale, packs]
                properties:
                  locale:
                    type: string
                  packs:
                    type: array
                    items:
                      $ref: "#/components/schemas/ContentPackManifestItem"
  /v1/content/packs/{packId}:
    get:
      summary: Get a content pack (or redirect to signed URL)
      parameters:
        - in: path
          name: packId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Content pack JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPack"
  /v1/config:
    get:
      summary: Get remote config / feature flags
      parameters:
        - in: query
          name: platform
          required: true
          schema:
            type: string
            enum: [ios, android]
        - in: query
          name: appVersion
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoteConfig"
  /v1/auth/apple:
    post:
      summary: Sign in with Apple token exchange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identityToken]
              properties:
                identityToken:
                  type: string
      responses:
        "200":
          description: Tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
  /v1/user/data:
    get:
      summary: Get user sync data
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserData"
    put:
      summary: Replace user sync data
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserData"
      responses:
        "200":
          description: Updated
  /v1/reports/image:
    post:
      summary: Report an AI-generated image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageReport"
      responses:
        "202":
          description: Accepted
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ContentPackManifestItem:
      type: object
      required: [packId, version, locale, checksumSha256, url]
      properties:
        packId: { type: string }
        version: { type: string }
        locale: { type: string }
        checksumSha256: { type: string }
        url: { type: string, format: uri }
    ContentPack:
      type: object
      required: [meta, categories, affirmations]
      properties:
        meta:
          type: object
          required: [packId, version, locale, generatedAt, checksumSha256]
          properties:
            packId: { type: string }
            version: { type: string }
            locale: { type: string }
            generatedAt: { type: string, format: date-time }
            checksumSha256: { type: string }
        categories:
          type: array
          items: { $ref: "#/components/schemas/Category" }
        affirmations:
          type: array
          items: { $ref: "#/components/schemas/Affirmation" }
    Category:
      type: object
      required: [id, locale, name, description, icon, isPremium, isSensitive, sortOrder, updatedAt]
      properties:
        id: { type: string }
        locale: { type: string }
        name: { type: string }
        description: { type: string }
        icon: { type: string }
        isPremium: { type: boolean }
        isSensitive: { type: boolean }
        sortOrder: { type: integer }
        updatedAt: { type: string, format: date-time }
    Affirmation:
      type: object
      required: [id, locale, text, tone, intensity, absolute, sensitiveTopic, categoryIds, tags, isPremium, source, createdAt, updatedAt]
      properties:
        id: { type: string }
        locale: { type: string }
        text: { type: string }
        tone: { type: string }
        intensity: { type: string }
        absolute: { type: boolean }
        sensitiveTopic: { type: boolean }
        categoryIds:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }
        contraindications:
          type: array
          items: { type: string }
        readingLevel: { type: integer }
        isPremium: { type: boolean }
        source: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    RemoteConfig:
      type: object
      required: [features, experiments]
      properties:
        features:
          type: object
          additionalProperties: true
        experiments:
          type: object
          additionalProperties: true
    AuthTokens:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: integer }
    UserData:
      type: object
      required: [favorites, preferences]
      properties:
        favorites:
          type: array
          items: { type: string }
        preferences:
          type: object
          additionalProperties: true
        customAffirmations:
          type: array
          items: { $ref: "#/components/schemas/Affirmation" }
    ImageReport:
      type: object
      required: [themeId, reason, createdAt]
      properties:
        themeId: { type: string }
        reason: { type: string }
        createdAt: { type: string, format: date-time }
        metadata:
          type: object
          additionalProperties: true
